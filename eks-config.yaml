apiVersion: v1
clusters:
- cluster:
    certificate-authority-data: 
    server: https://B12D98976F9341270C66A770AC261095.gr7.ap-south-1.eks.amazonaws.com
  name: trendstore-cluster.ap-south-1.eksctl.io
contexts:
- context:
    cluster: trendstore-cluster.ap-south-1.eksctl.io
    user: terraform-admin@trendstore-cluster.ap-south-1.eksctl.io
  name: terraform-admin@trendstore-cluster.ap-south-1.eksctl.io
current-context: terraform-admin@trendstore-cluster.ap-south-1.eksctl.io
kind: Config
users:
- name: terraform-admin@trendstore-cluster.ap-south-1.eksctl.io
  user:
    exec:
      apiVersion: client.authentication.k8s.io/v1beta1
      args:
      - eks
      - get-token
      - --output
      - json
      - --cluster-name
      - trendstore-cluster
