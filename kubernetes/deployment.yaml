apiVersion: apps/v1
kind: Deployment
metadata:
  name: trendstore-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trendstore
  template:
    metadata:
      labels:
        app: trendstore
    spec:
      containers:
      - name: trend-app
        image: bibekdec2022/trend-app:latest
        ports:
        - containerPort: 3000  # Updated to match the internal Nginx port
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
